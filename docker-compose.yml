x-app: &app-defaults
  build: .
  environment:
    - PYTHONUNBUFFERED=1
    - DOCS_ENABLED=true
    - CORS_ORIGINS=${CORS_ORIGINS:-*}
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    interval: 10s
    timeout: 5s
    retries: 3

services:
  app1:
    <<: *app-defaults

  app2:
    <<: *app-defaults

  app3:
    <<: *app-defaults

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      app3:
        condition: service_healthy
    restart: unless-stopped
